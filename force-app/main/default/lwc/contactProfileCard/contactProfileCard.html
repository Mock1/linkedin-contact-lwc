<template>
    <div class="slds-card slds-card_boundary">
        <div class="slds-card__body slds-card__body_inner">
            <div class="slds-grid slds-gutters">
                <!-- Avatar Section -->
                <div class="slds-col slds-size_1-of-4">
                    <div class="slds-align_absolute-center avatar-container">
                        <lightning-avatar
                            src={avatar}
                            fallback-icon-name="standard:user"
                            size="large"
                            variant="circle">
                        </lightning-avatar>
                    </div>
                </div>
                
                <!-- Profile Info Section -->
                <div class="slds-col slds-size_3-of-4">
                    <div class="slds-text-heading_large slds-p-bottom_x-small">{name}</div>
                    <div class="slds-text-title_bold slds-p-bottom_small">{title}</div>
                    
                    <div class="slds-grid slds-gutters_small">
                        <div class="slds-col">
                            <div class="slds-text-body_small slds-text-color_weak">Account</div>
                            <div class="slds-text-body_regular">
                                <lightning-formatted-url
                                    value={account.Id}
                                    label={account.Name}
                                    target="_blank">
                                </lightning-formatted-url>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
