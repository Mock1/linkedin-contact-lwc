<template>
    <div class="slds-card slds-card_boundary">
        <div class="slds-card__body slds-card__body_inner">
            <div class="slds-grid slds-gutters">
                <!-- Avatar Section -->
                <div class="slds-col slds-size_1-of-4 slds-align_absolute-center">
                    <div class="avatar-container slds-m-bottom_medium">
                        <template if:true={avatar}>
                            <img src={avatar} alt="Profile" class="avatar-image" />
                        </template>
                        <template if:false={avatar}>
                            <div class="avatar-fallback slds-align_absolute-center">
                                <svg focusable="false" aria-hidden="true" viewBox="0 0 1000 1000" part="icon" data-key="user">
                                    <g>
                                        <path d="M800 712v28c0 33-27 60-60 60H260c-33 0-60-27-60-60v-28c0-73 85-117 165-152l8-4c6-3 13-3 19 1a196 196 0 00216 1c6-4 13-4 19-1l8 4c80 34 165 78 165 151z"></path>
                                        <ellipse cx="500" cy="365" rx="149" ry="165"></ellipse>
                                    </g>
                                </svg>
                            </div>
                        </template>
                    </div>
                </div>
                
                <!-- Profile Info Section -->
                <div class="slds-col slds-size_3-of-4">
                    <div class="slds-text-heading_large slds-p-bottom_x-small">{name}</div>
                    <div class="slds-text-title_bold slds-p-bottom_small">{title}</div>
                    
                    <div class="slds-grid slds-gutters_small">
                        <div class="slds-col">
                            <div class="slds-text-body_small slds-text-color_weak">Account</div>
                            <div class="slds-text-body_regular">
                                <lightning-formatted-url
                                    value={account.Id}
                                    label={account.Name}
                                    target="_blank">
                                </lightning-formatted-url>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
